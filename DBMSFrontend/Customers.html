<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customers</title>
    <link rel="stylesheet" href="./App.css">
 </head>

  <body>
    <nav class="navBar">
      <a href="/"> Home </a>
      <a href="/Customers.html"> Customers </a>
      <a href="/Vendors.html"> Vendors </a>
      <a href="/Products.html"> Products </a>
      <a href="/Orders.html"> Orders </a>
      <a href="/AddOrderDetails.html"> Add Order Details </a>
    </nav>

    <div class="page">
      <h2>Current Customers</h2>
      <table id="DBtable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone Number</th>
            <th>Email</th>
          </tr>
        </thead>
        <tbody id="customersTableBody">
          </tbody>
      </table>
    </div>

    <div class="page">
      <h2>Add Customer</h2>
      <form class="form" action="/Customers" method="POST">
        <label>Full Name: <input type="text" name="customerName" required /></label>
        <label>Phone Number: <input type="text" name="phoneNumber" /></label>
        <label>Email: <input type="email" name="email" /></label>
        <button type="submit" class="submitButton">Add Customer</button>
      </form>
    </div>

    <div class="page">
      <h2>Update Customer</h2>
      <p> The goal will be to allow searching of records by ID or name </p>
      <form class="form" action="/Customers" method="POST">
        <label>Customer ID: <input type="text" name="customerID" /></label> 
        <label>New Full Name: <input type="text" name="customerName" required /></label>
        <label>New Phone Number: <input type="text" name="phoneNumber" /></label>
        <label>New Email: <input type="email" name="email" /></label>
        <button type="submit" class="submitButton">Update Customer</button>
      </form>
    </div>

    <div class="page">
      <h2>Delete Customer</h2>
      <p class="adminInstruction"> Dropdowns and warning message incoming </p>
      <form class="form" id="deleteCustomerForm">
        <label>Customer ID: <input type="number" name="customerID" id="deleteID" required /></label> 
        <button type="submit" class="deleteButton">Delete Customer</button>
      </form>
      <p id="deleteMessage" style="margin-top: 12px; font-weight: bold;"></p>
    </div>

    <script>
      // 1. READ: Function to dynamically load and display customers
      async function loadCustomers() {
        try {
          const response = await fetch('/api/customers'); 
          const customers = await response.json();
          const tbody = document.getElementById('customersTableBody');
          tbody.innerHTML = '';
          
          if (!customers || customers.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:red; padding: 10px;">⚠️ No database records found. Go to Home page and click Reset Database.</td></tr>`;
            return;
          }
          
          customers.forEach(c => {
            tbody.innerHTML += `
              <tr>
                <td style="padding: 8px;">${c.customerID}</td>
                <td style="padding: 8px;">${c.customerName}</td>
                <td style="padding: 8px;">${c.phoneNumber || 'N/A'}</td>
                <td style="padding: 8px;">${c.email}</td>
              </tr>
            `;
          });
        } catch (err) {
          console.error("❌ Network Error loading table data:", err);
          const tbody = document.getElementById('customersTableBody');
          tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:red; padding: 10px;">❌ Failed to reach backend API. Check node server logs.</td></tr>`;
        }
      }

      // 2. DELETE: Cleaned up single submission event handler to call stored procedure
      document.getElementById('deleteCustomerForm').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const customerID = document.getElementById('deleteID').value;
        const msgElement = document.getElementById('deleteMessage');
        msgElement.innerText = '';

        try {
          const response = await fetch(`/api/customers/${customerID}`, { 
            method: 'DELETE' 
          });
          const result = await response.json();

          if (response.ok) {
            msgElement.style.color = '#5cb85c';
            msgElement.innerText = `✅ Success: ${result.message}`;
            document.getElementById('deleteID').value = ''; 
            await loadCustomers(); // Re-fetch the live table rows seamlessly
          } else {
            msgElement.style.color = '#d9534f';
            msgElement.innerText = `❌ Error: ${result.error}`;
          }
        } catch (err) {
          msgElement.style.color = '#d9534f';
          msgElement.innerText = '❌ Request network communication failed.';
        }
      });

      // 3. INITIALIZE: Fetch data right away when window is open
      window.addEventListener('DOMContentLoaded', loadCustomers);
    </script>
  </body>
</html>
