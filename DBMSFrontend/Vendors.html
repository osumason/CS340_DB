<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendors</title>
  <link rel="stylesheet" href="./App.css">
</head>


<body>
  <nav class="navBar">
    <a href="/"> Home </a>
    <a href="/Customers.html"> Customers </a>
    <a href="/Vendors.html"> Vendors </a>
    <a href="/Products.html"> Products </a>
    <a href="/Orders.html"> Orders </a>
    <a href="/AddOrderDetails.html"> Add Order Details </a>
  </nav>

  <div class="page">
    <h2>Current Vendors</h2>
    <table id="DBtable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Vendor Name</th>
          <th>Contact Email</th>
          <th>Phone Number</th>
        </tr>
      </thead>
      <tbody id="vendorsTableBody"></tbody>
    </table>
  </div>

  <div class="page">
    <h2>Add Vendor</h2>
    <form class="form" id="addVendorForm">
      <label>Name: <input type="text" id="addVendorName" name="vendorName" /></label>
       <label>Email: <input type="email" id="addEmail" name="contactEmail" /></label>
      <label>Phone Number: <input type="text" id="addPhone" name="phoneNumber" /></label>
      <button type="submit" class="submitButton">Add Vendor</button>
    </form>
     <p id="addMessage" style="margin-top: 12px; font-weight: bold; text-align: center;"></p>
  </div>


  <div class="page">
    <h2>Update Vendor</h2>
    <form class="form" id="updateVendorForm">
      <label>Vendor ID: <input type="number" id="updateID" name="vendorID" required /></label>
      <label>New Name: <input type="text" id="updateVendorName" name="vendorName" /></label>
       <label>New Email: <input type="email" id="updateEmail" name="contactEmail" /></label>
      <label>New Phone Number: <input type="text" id="updatePhone" name="phoneNumber" /></label>
      <button type="submit" class="submitButton">Update Vendor</button>
    </form>
    <p id="updateMessage" style="margin-top: 12px; font-weight: bold; text-align: center;"></p>
  </div>


  <div class="page">
    <h2>Delete Vendor</h2>
    <p class="adminInstruction"> Note: vendors with products assigned can not be deleted.</p>
    <form class="form" id="deleteVendorForm">
      <label>Vendor ID: <input type="text" id="deleteID" name="vendorID" /></label>
      <label>Name: <input type="text" /></label>
      <button type="submit" class="deleteButton">Delete Vendor</button>
    </form>
    <p id="deleteMessage" style="margin-top: 12px; font-weight: bold;"></p>
  </div>

<script>
    // READ: load and display all vendors
    async function loadVendors() {
      try {
        const response = await fetch('/api/vendors');
        const vendors = await response.json();
        const tbody = document.getElementById('vendorsTableBody');
        tbody.innerHTML = '';
 
        if (!vendors || vendors.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:red; padding: 10px;">⚠️ No database records found. Go to Home page and click Reset Database.</td></tr>`;
          return;
        }
 
        vendors.forEach(v => {
          tbody.innerHTML += `
            <tr>
              <td style="padding: 8px;">${v.vendorID}</td>
              <td style="padding: 8px;">${v.vendorName}</td>
              <td style="padding: 8px;">${v.contactEmail || 'N/A'}</td>
              <td style="padding: 8px;">${v.phoneNumber || 'N/A'}</td>
            </tr>
          `;
        });
      } catch (err) {
        console.error("❌ Network Error loading table data:", err);
        const tbody = document.getElementById('vendorsTableBody');
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:red; padding: 10px;">❌ Failed to reach backend API. Check node server logs.</td></tr>`;
      }
    }
 
    // INITIALIZE event listener
    window.addEventListener('DOMContentLoaded', loadVendors);

    // CREATE event listener
    document.getElementById('addVendorForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgElement = document.getElementById('addMessage');
      msgElement.innerText = '';
 
      const vendorData = {
        vendorName: document.getElementById('addVendorName').value,
        contactEmail: document.getElementById('addEmail').value,
        phoneNumber: document.getElementById('addPhone').value
      };
 
      console.log(vendorData);
      try {
        const response = await fetch('/api/vendors', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(vendorData)
        });
        const result = await response.json();
 
        if (response.ok) {
          msgElement.style.color = '#5cb85c';
          msgElement.innerText = `✅ Success: Vendor added successfully!`;
          document.getElementById('addVendorForm').reset();
          await loadVendors();
        } else {
          msgElement.style.color = '#d9534f';
          msgElement.innerText = `❌ Error: ${result.error || 'Could not save record.'}`;
        }
      } catch (err) {
        msgElement.style.color = '#d9534f';
        msgElement.innerText = '❌ Network request failed to communicate with server.';
      }
    });
 
    // UPDATE event listener
    document.getElementById('updateVendorForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgElement = document.getElementById('updateMessage');
      msgElement.innerText = '';
 
      const vendorID = document.getElementById('updateID').value;
      const vendorData = {
        vendorName: document.getElementById('updateVendorName').value,
        contactEmail: document.getElementById('updateEmail').value,
        phoneNumber: document.getElementById('updatePhone').value
      };
 
      try {
        const response = await fetch(`/api/vendors/${vendorID}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(vendorData)
        });
        const result = await response.json();
 
        if (response.ok) {
          msgElement.style.color = '#5cb85c';
          msgElement.innerText = `✅ Success: Vendor ${vendorID} updated!`;
          document.getElementById('updateVendorForm').reset();
          await loadVendors();
        } else {
          msgElement.style.color = '#d9534f';
          msgElement.innerText = `❌ Error: ${result.error || 'Could not update record.'}`;
        }
      } catch (err) {
        msgElement.style.color = '#d9534f';
        msgElement.innerText = '❌ Network request failed to communicate with server.';
      }
    });
 
    // DELETE event listener
    document.getElementById('deleteVendorForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const vendorID = document.getElementById('deleteID').value;
      const msgElement = document.getElementById('deleteMessage');
      msgElement.innerText = '';
 
      try {
        const response = await fetch(`/api/vendors/${vendorID}`, { method: 'DELETE' });
        const result = await response.json();
 
        if (response.ok) {
          msgElement.style.color = '#5cb85c';
          msgElement.innerText = `✅ Success: ${result.message}`;
          document.getElementById('deleteID').value = '';
          await loadVendors();
        } else {
          msgElement.style.color = '#d9534f';
          msgElement.innerText = `❌ Error: ${result.error}`;
        }
      } catch (err) {
        msgElement.style.color = '#d9534f';
        msgElement.innerText = '❌ Request network communication failed.';
      }
    });

  </script>

</body>

</html>
