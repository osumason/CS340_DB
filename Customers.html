 </head>

    <div class="page">
      <h2>Add Customer</h2>
      <form class="form" action="/Customers" method="POST">
        <label>First Name: <input type="text" name="firstName" /></label>
        <label>Last Name: <input type="text" name="lastName" /></label>
        <label>Phone Number: <input type="text" name="phoneNumber" /></label>
        <label>Email: <input type="email" name="email" /></label>
        <button type="submit" class="submitButton">Add Customer</button>
      </form>
    </div>


        <div class="page">
      <h2>Update Customer</h2>
          <p> The goal will be to allow searching of records by ID or name </p>
      <form class="form" action="/Customers" method="PUT">
        <label>Customer ID: <input type="text" name="customerID" /></label> 
        <label>New First Name: <input type="text" name="firstName" /></label>
        <label>New Last Name: <input type="text" name="lastName" /></label>
        <label>New Phone Number: <input type="text" name="phoneNumber" /></label>
        <label>New Email: <input type="email" name="email" /></label>
        <button type="submit" class="submitButton">Update Customer</button>
      </form>
    </div>


     <div class="page">
      <h2>Delete Customer</h2>
          <p> The goal will be to allow searching of records by ID or name </p>
      <form class="form" action="/Customers" method="DELETE">
        <label>Customer ID: <input type="text" name="customerID" /></label> 
        <label>First Name: <input type="text" name="firstName" /></label>
        <button type="submit" class="submitButton">Delete Customer</button>
      </form>
    </div>
