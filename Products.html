<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <link rel="stylesheet" href="./App.css">
  </head>



  <body>
    <nav class="navBar">
      <a href="/"> Home </a>
      <a href="/Customers.html"> Customers </a>
      <a href="/Vendors.html"> Vendors </a>
      <a href="/Products.html"> Products </a>
      <a href="/Orders.html"> Orders </a>
      <a href="/AddOrderDetails.html"> Add Order Details </a>
    </nav>

    <div class="page">
      <h2>Add Product</h2>
      <form class="form" action="/Products" method="POST">
        <label>Product Name: <input type="text" name="productName" /></label>
        <label>Price: <input type="number" name="price" /></label>
        <label>Vendor ID: <input type="number" name="vendorID" /></label>
        <button type="submit" class="submitButton">Add Product</button>
      </form>
    </div>


    <div class="page">
      <h2>Update Product</h2>
      <p> The goal will be to allow searching of records by ID or name </p>   
      <form class="form" action="/Products" method="POST">
        <label>New Name: <input type="text" name="productName" /></label>
        <label>New Department: <input type="text" name="department" /></label>
        <label>New Price: <input type="number" name="price" /></label>
        <label>New Quantity: <input type="number" name="stockQuantity" /></label>
        <button type="submit" class="submitButton">Update Product</button>
      </form>
    </div>


     <div class="page">
      <h2>Delete Product</h2>
      <p> The goal will be to allow searching of records by ID or name </p>
      <form class="form" action="/Products" method="DELETE">
        <label>Product ID: <input type="number" name="productID" /></label>
        <label>Name: <input type="text" name="productName" /></label>
        <button type="submit" class="submitButton">Delete Product</button>
      </form>
    </div>



  </body>
</html>
