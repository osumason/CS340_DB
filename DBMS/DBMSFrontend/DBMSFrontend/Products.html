<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <link rel="stylesheet" href="./App.css">
  </head>

  <body>
    <nav class="navBar">
      <a href="/"> Home </a>
      <a href="/Customers.html"> Customers </a>
      <a href="/Vendors.html"> Vendors </a>
      <a href="/Products.html"> Products </a>
      <a href="/Orders.html"> Orders </a>
      <a href="/AddOrderDetails.html"> Add Order Details </a>
    </nav>

  
  <div class="page">
    <h2>Current Products</h2>
    <table id="DBtable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Product Name</th>
          <th>Department</th>
          <th>Price</th>
          <th>Stock Qty</th>
          <th>Vendor</th>
        </tr>
      </thead>
      <tbody id="productsTableBody"></tbody>
    </table>
  </div>
 
  <div class="page">
    <h2>Add Product</h2>
    <form class="form" id="addProductForm">
      <label>Product Name: <input type="text" id="addName" name="productName" required /></label>
      <label>Department: <input type="text" id="addDepartment" name="department" /></label>
      <label>Price: <input type="number" step="0.01" id="addPrice" name="price" required /></label>
      <label>Stock Quantity: <input type="number" id="addStockQuantity" name="stockQuantity" required /></label>
      <label>Vendor:
        <select id="addVendorID" name="vendorID" required>
          <option value="">-- Select a Vendor --</option>
        </select>
      </label>
      <button type="submit" class="submitButton">Add Product</button>
    </form>
    <p id="addMessage" style="margin-top: 12px; font-weight: bold; text-align: center;"></p>
  </div>
 
  <div class="page">
    <h2>Update Product</h2>
    <form class="form" id="updateProductForm">
      <label>Product ID: <input type="number" id="updateID" name="productID" required /></label>
      <label>New Name: <input type="text" id="updateName" name="productName" required /></label>
      <label>New Department: <input type="text" id="updateDepartment" name="department" /></label>
      <label>New Price: <input type="number" step="0.01" id="updatePrice" name="price" required /></label>
      <label>New Quantity: <input type="number" id="updateQuantity" name="stockQuantity" required /></label>
      <label>New Vendor:
        <select id="updateVendorID" name="vendorID" required>
          <option value="">-- Select a Vendor --</option>
        </select>
      </label>
      <button type="submit" class="submitButton">Update Product</button>
    </form>
    <p id="updateMessage" style="margin-top: 12px; font-weight: bold; text-align: center;"></p>
  </div>
 
  <div class="page">
    <h2>Delete Product</h2>
    <p class="adminInstruction">Note: products referenced in existing order details cannot be deleted.</p>
    <form class="form" id="deleteProductForm">
      <label>Product ID: <input type="number" id="deleteID" name="productID" required /></label>
      <button type="submit" class="deleteButton">Delete Product</button>
    </form>
    <p id="deleteMessage" style="margin-top: 12px; font-weight: bold;"></p>
  </div>
 
  <script>
    // READ: load and display all products
    async function loadProducts() {
      try {
        const response = await fetch('/api/products');
        const products = await response.json();
        const tbody = document.getElementById('productsTableBody');
        tbody.innerHTML = '';
 
        if (!products || products.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red; padding: 10px;">⚠️ No database records found. Go to Home page and click Reset Database.</td></tr>`;
          return;
        }
 
        products.forEach(p => {
          tbody.innerHTML += `
            <tr>
              <td style="padding: 8px;">${p.productID}</td>
              <td style="padding: 8px;">${p.productName}</td>
              <td style="padding: 8px;">${p.department || 'N/A'}</td>
              <td style="padding: 8px;">$${parseFloat(p.price).toFixed(2)}</td>
              <td style="padding: 8px;">${p.stockQuantity}</td>
              <td style="padding: 8px;">${p.vendorName}</td>
            </tr>
          `;
        });
      } catch (err) {
        console.error("❌ Network Error loading table data:", err);
        const tbody = document.getElementById('productsTableBody');
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red; padding: 10px;">❌ Failed to reach backend API. Check node server logs.</td></tr>`;
      }
    }
 
    // DROPDOWN: populate vendor selects for add and update forms
    async function loadVendorDropdowns() {
      try {
        const response = await fetch('/api/vendors/dropdown');
        const vendors = await response.json();
 
        const addSelect = document.getElementById('addVendorID');
        const updateSelect = document.getElementById('updateVendorID');
 
        vendors.forEach(v => {
          const addOption = document.createElement('option');
          addOption.value = v.vendorID;
          addOption.textContent = v.vendorName;
          addSelect.appendChild(addOption);
 
          const updateOption = document.createElement('option');
          updateOption.value = v.vendorID;
          updateOption.textContent = v.vendorName;
          updateSelect.appendChild(updateOption);
        });
      } catch (err) {
        console.error("❌ Error loading vendor dropdown:", err);
      }
    }
 
    // CREATE
    document.getElementById('addProductForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgElement = document.getElementById('addMessage');
      msgElement.innerText = '';
 
      const productData = {
        productName: document.getElementById('addName').value,
        department: document.getElementById('addDepartment').value,
        price: document.getElementById('addPrice').value,
        stockQuantity: document.getElementById('addStockQuantity').value,
        vendorID: document.getElementById('addVendorID').value
      };
 
      try {
        const response = await fetch('/api/products', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(productData)
        });
        const result = await response.json();
 
        if (response.ok) {
          msgElement.style.color = '#5cb85c';
          msgElement.innerText = `✅ Success: Product added successfully!`;
          document.getElementById('addProductForm').reset();
          document.getElementById('addVendorID').selectedIndex = 0;
          await loadProducts();
        } else {
          msgElement.style.color = '#d9534f';
          msgElement.innerText = `❌ Error: ${result.error || 'Could not save record.'}`;
        }
      } catch (err) {
        msgElement.style.color = '#d9534f';
        msgElement.innerText = '❌ Network request failed to communicate with server.';
      }
    });
 
    // UPDATE
    document.getElementById('updateProductForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgElement = document.getElementById('updateMessage');
      msgElement.innerText = '';
 
      const productID = document.getElementById('updateID').value;
      const productData = {
        productName: document.getElementById('updateName').value,
        department: document.getElementById('updateDepartment').value,
        price: document.getElementById('updatePrice').value,
        stockQuantity: document.getElementById('updateQuantity').value,
        vendorID: document.getElementById('updateVendorID').value
      };
 
      try {
        const response = await fetch(`/api/products/${productID}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(productData)
        });
        const result = await response.json();
 
        if (response.ok) {
          msgElement.style.color = '#5cb85c';
          msgElement.innerText = `✅ Success: Product ${productID} updated!`;
          document.getElementById('updateProductForm').reset();
          document.getElementById('updateVendorID').selectedIndex = 0;
          await loadProducts();
        } else {
          msgElement.style.color = '#d9534f';
          msgElement.innerText = `❌ Error: ${result.error || 'Could not update record.'}`;
        }
      } catch (err) {
        msgElement.style.color = '#d9534f';
        msgElement.innerText = '❌ Network request failed to communicate with server.';
      }
    });
 
    // DELETE
    document.getElementById('deleteProductForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const productID = document.getElementById('deleteID').value;
      const msgElement = document.getElementById('deleteMessage');
      msgElement.innerText = '';
 
      try {
        const response = await fetch(`/api/products/${productID}`, { method: 'DELETE' });
        const result = await response.json();
 
        if (response.ok) {
          msgElement.style.color = '#5cb85c';
          msgElement.innerText = `✅ Success: ${result.message}`;
          document.getElementById('deleteID').value = '';
          await loadProducts();
        } else {
          msgElement.style.color = '#d9534f';
          msgElement.innerText = `❌ Error: ${result.error}`;
        }
      } catch (err) {
        msgElement.style.color = '#d9534f';
        msgElement.innerText = '❌ Request network communication failed.';
      }
    });
 
    // INITIALIZE
    window.addEventListener('DOMContentLoaded', () => {
      loadProducts();
      loadVendorDropdowns();
    });
  </script>
</body>
 
</html>
